<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <title>Dashboard</title>
   <link rel="preconnect" href="https://fonts.googleapis.com" />
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
   <link rel="stylesheet" href="modules/css/main.css" />
</head>

<body>
   <div class="wrapper">
      <aside class="sidebar">
         <div class="sidebar-top">
            <span class="sidebar-logo">Dashboard</span>
            <button class="toggle-btn">☰</button>
         </div>

         <div class="sidebar-body">
            <div class="sidebar-section">
               <select id="monthSelect">
                  <option value="0" selected>January</option>
                  <option value="1">February</option>
                  <option value="2">March</option>
                  <option value="3">April</option>
                  <option value="4">May</option>
                  <option value="5">June</option>
                  <option value="6">July</option>
                  <option value="7">August</option>
                  <option value="8">September</option>
                  <option value="9">October</option>
                  <option value="10">November</option>
                  <option value="11">December</option>
               </select>

               <select id="yearSelect">
                  <option value="2025">2025</option>
                  <option value="2026" selected>2026</option>
                  <option value="2027">2027</option>
               </select>

               <nav class="sidebar-nav">
                  <button class="nav-item active" data-tab="projects">Progects</button>
                  <button class="nav-item" data-tab="employees">Employees</button>
               </nav>

               <button class="seed-btn">Seed Data</button>
            </div>
         </div>


      </aside>
      <main class="main">
         <header class="main-header">
            <span class="main-title">Projects</span>
            <button class="add-btn">+ Add Project</button>
         </header>

         <div class="tab-bar">
            <button class="tab active" data-tab="projects">Projects</button>
            <button class="tab" data-tab="employees">Employees</button>
         </div>

         <div class="content">
            <div class="tab-panel active" id="panel-projects">
               <table>
                  <thead>
                     <tr>
                        <th>Company</th>
                        <th>Project</th>
                        <th>Budget</th>
                        <th>Capacity</th>
                        <th>Employees</th>
                        <th>Est. Income</th>
                        <th>Actions</th>
                     </tr>
                  </thead>
                  <tbody id="projectsBody">
                  </tbody>
               </table>
               <div class="income-row">
                  <span>Total Estimated Income:</span>
                  <span id="totalIncome">$0</span>
               </div>
            </div>
            <div class="tab-panel" id="panel-employees">
               <table>
                  <thead>
                     <tr>
                        <th>Name</th>
                        <th>Surname</th>
                        <th>Age</th>
                        <th>Position</th>
                        <th>Salary</th>
                        <th>Est. Payment</th>
                        <th>Projects</th>
                        <th>Proj. Income</th>
                        <th>Actions</th>
                     </tr>
                  </thead>
                  <tbody id="employeesBody">
                  </tbody>
               </table>
            </div>
         </div>
      </main>
   </div>
   <div class="panel-overlay" id="panelOverlay"></div>

   <div class="slide-panel" id="addProjectPanel">
      <div class="panel-header">
         <h2>Add Project</h2>
         <button class="panel-close">×</button>
      </div>
      <div class="panel-body">
         <div class="panel-body">
            <div class="form-group">
               <label>Project Name</label>
               <input type="text" id="projectName" placeholder="Enter project name" />
               <span class="form-error" id="projectNameError"></span>
            </div>
            <div class="form-group">
               <label>Company Name</label>
               <input type="text" id="companyName" placeholder="Enter company name" />
               <span class="form-error" id="companyNameError"></span>
            </div>
            <div class="form-group">
               <label>Budget</label>
               <input type="number" id="projectBudget" placeholder="0.00" />
               <span class="form-error" id="projectBudgetError"></span>
            </div>
            <div class="form-group">
               <label>Capacity</label>
               <input type="number" id="projectCapacity" placeholder="1" />
               <span class="form-error" id="projectCapacityError"></span>
            </div>
            <button class="submit-btn" id="submitProject" disabled>Add Project</button>
         </div>
      </div>
   </div>

   <div class="slide-panel" id="addEmployeePanel">
      <div class="panel-header">
         <h2>Add Employee</h2>
         <button class="panel-close" id="closeEmployeePanel">×</button>
      </div>
      <div class="panel-body">
         <div class="form-group">
            <label>Name</label>
            <input type="text" id="employeeName" placeholder="Enter name" />
            <span class="form-error" id="employeeNameError"></span>
         </div>
         <div class="form-group">
            <label>Surname</label>
            <input type="text" id="employeeSurname" placeholder="Enter surname" />
            <span class="form-error" id="employeeSurnameError"></span>
         </div>
         <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="employeeDob" />
            <span class="form-error" id="employeeDobError"></span>
         </div>
         <div class="form-group">
            <label>Position</label>
            <select id="employeePosition">
               <option value="">Select position</option>
               <option value="Junior">Junior</option>
               <option value="Middle">Middle</option>
               <option value="Senior">Senior</option>
               <option value="Lead">Lead</option>
               <option value="Architect">Architect</option>
               <option value="BO">BO</option>
            </select>
            <span class="form-error" id="employeePositionError"></span>
         </div>
         <div class="form-group">
            <label>Salary</label>
            <input type="number" id="employeeSalary" placeholder="0.00" />
            <span class="form-error" id="employeeSalaryError"></span>
         </div>
         <button class="submit-btn" id="submitEmployee" disabled>Add Employee</button>
      </div>
   </div>

   <script type="module" src="modules/js/main.js"></script>
</body>

</html>
